<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Factor Energía — Agente CRM</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f8;--s0:#ffffff;--s1:#f7f9fc;--s2:#edf1f7;
  --bd:#dde3ed;--bd2:#c5cfe0;
  --tx:#1a2540;--mt:#6b7a99;--mt2:#9aa3b8;
  --ac:#1a56db;--acl:#e8effe;--ach:#1344b0;
  --gr:#0b7a47;--grl:#e6f7ef;
  --rd:#c0392b;--rdl:#fdecea;
  --am:#b45309;--aml:#fef3e2;
  --pu:#6d28d9;--pul:#ede9fe;
  --fn:'IBM Plex Sans',sans-serif;--mo:'IBM Plex Mono',monospace;
  --r:8px;--r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;}
.tb{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:50px;background:var(--ac);border-bottom:1px solid var(--ach);flex-shrink:0;box-shadow:0 2px 8px rgba(26,86,219,.25);}
.logo{font-size:13px;font-weight:600;color:#fff;display:flex;align-items:center;gap:10px;}
.logo-sep{width:1px;height:16px;background:rgba(255,255,255,.3);}
.logo-sub{font-size:11px;font-weight:400;color:rgba(255,255,255,.75);}
.tb-stats{display:flex;gap:4px;}
.tstat{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,.12);cursor:pointer;transition:background .15s;}
.tstat:hover{background:rgba(255,255,255,.2);}
.tstat-v{font-size:15px;font-weight:600;color:#fff;font-family:var(--mo);}
.tstat-l{font-size:10px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.05em;}
.tstat-dot{width:7px;height:7px;border-radius:50%;}
.dot-gr{background:#4ade80;}.dot-am{background:#fbbf24;}.dot-rd{background:#f87171;}.dot-pu{background:#c4b5fd;}.dot-gray{background:#aaa;}
.main{display:flex;flex:1;overflow:hidden;}
.lp{width:280px;flex-shrink:0;border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;background:var(--s0);}
.lp-top{padding:10px 12px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--s1);}
.lp-search{width:100%;background:var(--s0);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;font-size:12px;font-family:var(--fn);color:var(--tx);outline:none;}
.lp-search:focus{border-color:var(--ac);}
.lp-filters{display:flex;gap:3px;margin-top:7px;flex-wrap:wrap;}
.ftab{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid var(--bd);background:none;color:var(--mt);cursor:pointer;font-family:var(--fn);transition:all .15s;white-space:nowrap;}
.ftab.on{background:var(--acl);border-color:var(--ac);color:var(--ac);font-weight:500;}
.ftab:hover:not(.on){background:var(--s2);}
.lp-list{flex:1;overflow-y:auto;}
.lp-list::-webkit-scrollbar{width:3px;}.lp-list::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}
.cp-header{display:flex;align-items:center;justify-content:space-between;padding:7px 12px 5px;background:var(--s2);border-bottom:1px solid var(--bd);cursor:pointer;user-select:none;position:sticky;top:0;z-index:1;}
.cp-header:hover{background:var(--bd);}
.cp-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--mt);}
.cp-count{font-size:10px;font-family:var(--mo);color:var(--mt2);}
.cp-arrow{font-size:9px;color:var(--mt2);transition:transform .15s;}.cp-arrow.open{transform:rotate(90deg);}
.ci{padding:9px 12px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s;}
.ci:hover{background:var(--s1);}.ci.sel{background:var(--acl);border-left:3px solid var(--ac);}
.ci-r1{display:flex;align-items:flex-start;justify-content:space-between;gap:4px;margin-bottom:2px;}
.ci-name{font-size:12px;font-weight:500;line-height:1.3;flex:1;}
.ci-badges{display:flex;gap:3px;flex-shrink:0;align-items:center;margin-top:1px;}
.badge{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;}
.b-pro{background:var(--pul);color:var(--pu);}.b-prio{background:var(--aml);color:var(--am);}
.ci-r2{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.ci-sec{font-size:10px;color:var(--mt);}.ci-tel{font-size:10px;font-family:var(--mo);color:var(--ac);}
.ci-kw{font-size:9px;background:var(--s2);color:var(--mt);padding:1px 4px;border-radius:3px;font-family:var(--mo);}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.sdot.pendiente{background:var(--mt2);}.sdot.visitaOK{background:var(--gr);}
.sdot.noInteresa{background:var(--rd);}.sdot.rellamar{background:var(--am);animation:pulse 1.2s infinite;}
.sdot.noContesta{background:#aaa;}.sdot.llamando{background:var(--ac);box-shadow:0 0 5px var(--ac);animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.rp{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--mt2);}
.empty-icon{font-size:40px;opacity:.25;}.empty p{font-size:13px;}
.det{flex:1;overflow-y:auto;padding:16px 20px;display:none;flex-direction:column;gap:12px;}
.det.vis{display:flex;}
.det::-webkit-scrollbar{width:3px;}.det::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}
.card{background:var(--s0);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--bd);background:var(--s1);}
.card-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--mt);}
.ch-wrap{padding:14px;}
.ch-name{font-size:20px;font-weight:600;line-height:1.2;margin-bottom:6px;}
.ch-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.ch-badge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:500;}
.ficha-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 14px 14px;}
.fg-item{display:flex;flex-direction:column;gap:3px;}
.fg-item.span2{grid-column:span 2;}
.fg-label{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--mt);font-weight:500;}
.fg-input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:5px;padding:5px 7px;font-size:12px;font-family:var(--mo);color:var(--tx);outline:none;transition:border-color .15s;}
.fg-input:focus{border-color:var(--ac);background:var(--s0);}
.res-btns{display:flex;gap:6px;flex-wrap:wrap;padding:12px 14px 8px;}
.rbtn{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--fn);border:1px solid transparent;transition:all .15s;}
.r-ok{background:var(--grl);color:var(--gr);border-color:rgba(11,122,71,.2);}
.r-cb{background:var(--aml);color:var(--am);border-color:rgba(180,83,9,.2);}
.r-nc{background:var(--s2);color:var(--mt);border-color:var(--bd);}
.r-ni{background:var(--rdl);color:var(--rd);border-color:rgba(192,57,43,.2);}
.rbtn.on{outline:2px solid currentColor;outline-offset:2px;font-weight:600;}
.rbtn:hover{filter:brightness(.94);}
textarea.nt{width:calc(100% - 28px);margin:0 14px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:8px 10px;color:var(--tx);font-size:12px;font-family:var(--fn);resize:vertical;min-height:70px;outline:none;}
textarea.nt:focus{border-color:var(--ac);background:var(--s0);}
.save-bar{display:flex;justify-content:flex-end;gap:7px;padding:0 14px 14px;}
.phase{border-bottom:1px solid var(--bd);}.phase:last-child{border-bottom:none;}
.ph-head{padding:9px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.ph-head:hover{background:var(--s1);}
.ph-num{width:20px;height:20px;border-radius:50%;background:var(--acl);border:1px solid rgba(26,86,219,.2);color:var(--ac);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ph-title{font-size:11px;font-weight:600;flex:1;}.ph-tag{font-size:10px;color:var(--mt2);}
.ph-body{padding:10px 14px;font-size:12px;line-height:1.85;color:#3a4a6b;border-top:1px solid var(--bd);white-space:pre-wrap;display:none;}
.ph-body.op{display:block;}
.cban{display:none;background:linear-gradient(90deg,var(--acl),#f0f5ff);border:1px solid rgba(26,86,219,.2);border-radius:var(--r);padding:10px 14px;align-items:center;gap:10px;}
.cban.on{display:flex;}
.cwave{display:flex;gap:3px;align-items:center;}
.cwave span{width:3px;background:var(--ac);border-radius:2px;animation:wv .8s infinite ease-in-out;}
.cwave span:nth-child(1){height:8px;}.cwave span:nth-child(2){height:14px;animation-delay:.12s;}
.cwave span:nth-child(3){height:10px;animation-delay:.24s;}.cwave span:nth-child(4){height:6px;animation-delay:.36s;}
@keyframes wv{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
.ct{flex:1;font-size:12px;font-weight:500;color:var(--ac);}.ctm{font-family:var(--mo);font-size:14px;font-weight:600;color:var(--ac);}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-size:12px;font-weight:500;font-family:var(--fn);cursor:pointer;border:none;transition:all .15s;}
.btn-pr{background:var(--ac);color:#fff;}.btn-pr:hover{background:var(--ach);}
.btn-gh{background:var(--s0);color:var(--tx);border:1px solid var(--bd);}.btn-gh:hover{border-color:var(--bd2);}
.btn-dn{background:var(--rdl);color:var(--rd);border:1px solid rgba(192,57,43,.2);}
.btn-sm{padding:5px 10px;font-size:11px;}
.stag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;}
.stag.pendiente{background:var(--s2);color:var(--mt);}.stag.visitaOK{background:var(--grl);color:var(--gr);}
.stag.noInteresa{background:var(--rdl);color:var(--rd);}.stag.rellamar{background:var(--aml);color:var(--am);}
.stag.noContesta{background:var(--s2);color:var(--mt);}.stag.llamando{background:var(--acl);color:var(--ac);}
.toast{position:fixed;bottom:16px;right:16px;background:var(--s0);border:1px solid var(--bd2);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--tx);z-index:999;transform:translateY(40px);opacity:0;transition:all .2s;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.1);}
.toast.show{transform:translateY(0);opacity:1;}.toast.ok{border-color:rgba(11,122,71,.3);color:var(--gr);}.toast.err{border-color:rgba(192,57,43,.3);color:var(--rd);}
.hidden-cfg{display:none;}
</style>
</head>

<div class="tb">

    <div class="tstat" onclick="setF('visitaOK',null)"><div class="tstat-dot dot-gr"></div><div class="tstat-v" id="sv">0</div><div class="tstat-l">Visitas</div></div>
    <div class="tstat" onclick="setF('rellamar',null)"><div class="tstat-dot dot-am"></div><div class="tstat-v" id="sr">0</div><div class="tstat-l">Rellamar</div></div>
    <div class="tstat" onclick="setF('noInteresa',null)"><div class="tstat-dot dot-rd"></div><div class="tstat-v" id="sni">0</div><div class="tstat-l">No interesa</div></div>
    <div class="tstat" onclick="setF('noContesta',null)"><div class="tstat-dot dot-gray"></div><div class="tstat-v" id="snc">0</div><div class="tstat-l">No contesta</div></div>
  </div>
</div>
<div class="main">
  <div class="lp">
    <div class="lp-top">
      <input class="lp-search" type="text" id="sq" placeholder="🔍  Buscar empresa, calle, sector..." oninput="renderList()">
      <div class="lp-filters">
        <button class="ftab on" onclick="setF('todos',this)">Todos</button>
        <button class="ftab" onclick="setF('prioritario',this)">⚡ PRO</button>
        <button class="ftab" onclick="setF('pendiente',this)">Pendiente</button>
        <button class="ftab" onclick="setF('visitaOK',this)">Visitas</button>
        <button class="ftab" onclick="setF('rellamar',this)">Rellamar</button>
        <button class="ftab" onclick="setF('noContesta',this)">No contesta</button>
      </div>
    </div>
    <div class="lp-list" id="lp-list"></div>
  </div>
  <div class="rp">
    <div class="empty" id="empty"><div class="empty-icon">📋</div><p>Selecciona un contacto</p></div>
    <div class="det" id="det">

      <!-- FICHA CLIENTE -->
      <div class="card">
        <div class="card-head">
          <div class="card-title">Ficha del cliente</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span id="d-stag" class="stag pendiente">● Pendiente</span>
            <button class="btn btn-gh btn-sm" onclick="copyScript()">📋 Guión</button>
            <button class="btn btn-pr btn-sm" id="bcall" onclick="launchCall()">📞 Llamar con IA</button>
          </div>
        </div>
        <div class="ch-wrap">
          <div class="ch-name" id="d-name">—</div>
          <div class="ch-meta" id="d-meta"></div>
        </div>
        <div class="ficha-grid" id="ficha-grid"></div>
      </div>

      <!-- CALLING BANNER -->
      <div class="cban" id="cban">
        <div class="cwave"><span></span><span></span><span></span><span></span></div>
        <div class="ct">Llamada en curso — agente IA hablando...</div>
        <div class="ctm" id="ctm">0:00</div>
        <button class="btn btn-dn btn-sm" onclick="stopCall()">Colgar</button>
      </div>

      <!-- RESULTADO -->
      <div class="card">
        <div class="card-head"><div class="card-title">Resultado de la llamada</div></div>
        <div class="res-btns">
          <button class="rbtn r-ok" onclick="setRes('visitaOK',this)">✓ Visita concertada</button>
          <button class="rbtn r-cb" onclick="setRes('rellamar',this)">↺ Rellamar</button>
          <button class="rbtn r-nc" onclick="setRes('noContesta',this)">✕ No contesta</button>
          <button class="rbtn r-ni" onclick="setRes('noInteresa',this)">— No interesa</button>
        </div>
        <textarea class="nt" id="notas" placeholder="Notas: nombre del contacto, fecha visita, objeciones, observaciones..."></textarea>
        <div class="save-bar">
          <button class="btn btn-gh btn-sm" onclick="clearRes()">Limpiar</button>
          <button class="btn btn-pr btn-sm" onclick="saveRes()">Guardar resultado</button>
        </div>
      </div>

      <!-- GUIÓN -->
      <div class="card">
        <div class="card-head"><div class="card-title">Guión de llamada personalizado</div></div>
        <div id="sb"></div>
      </div>

    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

let C=[],curId=null,curF='todos',curR=null,iv=null,sec=0;

function isPRO(c){return c.potencia_kw>15||(c.consumo&&parseFloat(c.consumo)>10000);}

function init(){
  try{
    const s=JSON.parse(localStorage.getItem(SK)||'[]');
    C=RAW.map(r=>{
      const x=s.find(y=>y.id===r.id);
      return x?{...r,estado:x.estado||'pendiente',notas:x.notas||'',contactName:x.contactName||'',
        email:x.email||r.email||'',visitDate:x.visitDate||'',cups:x.cups||'',
        consumo:x.consumo||'',telefono2:x.telefono2||'',potencia_kw:x.potencia_kw||r.potencia_kw}
        :{...r,estado:'pendiente',notas:'',contactName:'',visitDate:'',cups:'',consumo:'',telefono2:''};
    });
  }catch{C=RAW.map(r=>({...r,estado:'pendiente',notas:'',contactName:'',visitDate:'',cups:'',consumo:'',telefono2:''}));}
  upStats();renderList();
}

function save(){
  localStorage.setItem(SK,JSON.stringify(C.map(c=>({
    id:c.id,estado:c.estado,notas:c.notas||'',contactName:c.contactName||'',
    email:c.email||'',visitDate:c.visitDate||'',cups:c.cups||'',
    consumo:c.consumo||'',telefono2:c.telefono2||'',potencia_kw:c.potencia_kw
  }))));
}

function upStats(){
  document.getElementById('st').textContent=C.length;
  document.getElementById('spr').textContent=C.filter(c=>isPRO(c)).length;
  document.getElementById('sv').textContent=C.filter(c=>c.estado==='visitaOK').length;
  document.getElementById('sr').textContent=C.filter(c=>c.estado==='rellamar').length;
  document.getElementById('sni').textContent=C.filter(c=>c.estado==='noInteresa').length;
  document.getElementById('snc').textContent=C.filter(c=>c.estado==='noContesta').length;
}

function setF(f,el){
  curF=f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  if(el){el.classList.add('on');}
  else{
    const idx={todos:0,prioritario:1,pendiente:2,visitaOK:3,rellamar:4,noContesta:5}[f]??0;
    const tabs=document.querySelectorAll('.ftab');
    if(tabs[idx]) tabs[idx].classList.add('on');
  }
  renderList();
}

function renderList(){
  const q=(document.getElementById('sq').value||'').toLowerCase();
  let list=C;
  if(curF==='prioritario') list=list.filter(c=>isPRO(c));
  else if(curF!=='todos') list=list.filter(c=>c.estado===curF);
  if(q) list=list.filter(c=>
    c.nombre.toLowerCase().includes(q)||
    (c.telefono||'').includes(q)||
    c.direccion.toLowerCase().includes(q)||
    c.sector.toLowerCase().includes(q)||
    (c.cp||'').includes(q)
  );
  const groups={};
  list.forEach(c=>{const cp=c.cp||'OTRO';if(!groups[cp])groups[cp]=[];groups[cp].push(c);});
  const cpOrder=Object.keys(groups).sort();
  let html='';
  cpOrder.forEach(cp=>{
    const name=CP_NAMES[cp]||cp;
    const isOpen=localStorage.getItem('cpg_'+cp)!=='0';
    html+=`<div><div class="cp-header" onclick="toggleCP('${cp}')">
      <span class="cp-name">📍 ${name}</span>
      <span class="cp-count">${groups[cp].length}</span>
      <span class="cp-arrow ${isOpen?'open':''}" id="arr_${cp}">▶</span>
    </div><div id="cpg_${cp}" style="${isOpen?'':'display:none'}">`;
    groups[cp].forEach(c=>{
      const pro=isPRO(c);
      html+=`<div class="ci${c.id===curId?' sel':''}" onclick="sel(${c.id})">
        <div class="ci-r1"><div class="ci-name">${c.nombre}</div>
          <div class="ci-badges">${pro?'<span class="badge b-pro">PRO</span>':''}${c.prioritario&&!pro?'<span class="badge b-prio">⚡</span>':''}<span class="sdot ${c.estado}"></span></div>
        </div>
        <div class="ci-r2"><span class="ci-sec">${c.sector}</span><span class="ci-tel">${c.telefono}</span><span class="ci-kw">${c.potencia_kw} kW</span></div>
      </div>`;
    });
    html+='</div></div>';
  });
  document.getElementById('lp-list').innerHTML=html;
}

function toggleCP(cp){
  const el=document.getElementById('cpg_'+cp);
  const arr=document.getElementById('arr_'+cp);
  const isOpen=el.style.display!=='none';
  el.style.display=isOpen?'none':'';
  arr.classList.toggle('open',!isOpen);
  localStorage.setItem('cpg_'+cp,isOpen?'0':'1');
}

const SL={pendiente:'● Pendiente',visitaOK:'✓ Visita OK',noInteresa:'✕ No interesa',rellamar:'↺ Rellamar',noContesta:'— No contesta',llamando:'◎ Llamando'};

    <div class="fg-item"><div class="fg-label">Potencia (kW)</div><input class="fg-input" value="${c.potencia_kw}" onchange="saveField(${id},'potencia_kw',parseFloat(this.value)||0)"></div>
    <div class="fg-item"><div class="fg-label">Consumo anual (kWh)</div><input class="fg-input" value="${c.consumo||''}" placeholder="Escribe consumo..." onchange="saveField(${id},'consumo',this.value)"></div>

    <div class="fg-item"><div class="fg-label">CUPS</div><input class="fg-input" value="${c.cups||''}" placeholder="ES0021..." onchange="saveField(${id},'cups',this.value)"></div>
    <div class="fg-item"><div class="fg-label">Fecha visita</div><input class="fg-input" value="${c.visitDate||''}" placeholder="—" onchange="saveField(${id},'visitDate',this.value)"></div>

    <div class="fg-item"><div class="fg-label">NIF</div><input class="fg-input" value="${c.nif}" onchange="saveField(${id},'nif',this.value)"></div>

  document.getElementById('notas').value=c.notas||'';
  document.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('on'));
  const rm={visitaOK:'r-ok',rellamar:'r-cb',noContesta:'r-nc',noInteresa:'r-ni'};

function saveField(id,field,value){
  const c=C.find(x=>x.id===id);if(!c) return;
  c[field]=value;
  save();upStats();
  // Refresh PRO badge
  const pro=isPRO(c);
  const st=document.getElementById('d-stag');
  if(st){st.className='stag '+c.estado;st.textContent=SL[c.estado]||c.estado;}
}

DATOS DEL SUMINISTRO (solo para contexto, no los menciones salvo que sea necesario):
- Empresa: ${c.nombre}

Si RECHAZA CLARAMENTE (2 veces ya has intentado):

CUANDO CONSIGAS REUNIÓN:
Confirma día y hora. Pregunta nombre del contacto. Si pregunta qué preparar: "Si tienes una factura reciente de la luz a mano, perfecto. Sino no hace falta nada más." Despídete y CUELGA.

function setRes(e,b){curR=e;document.querySelectorAll('.rbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');}

function saveRes(){
  if(curId===null) return;
  const c=C.find(x=>x.id===curId);
  if(curR) c.estado=curR;
  c.notas=document.getElementById('notas').value;
  save();upStats();renderList();sel(curId);
  toast('Resultado guardado','ok');
}

function clearRes(){curR=null;document.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('on'));document.getElementById('notas').value='';}

async function launchCall(){
  const c=C.find(x=>x.id===curId);if(!c) return;
  const phone=c.telefono.startsWith('+')?c.telefono:'+34'+c.telefono.replace(/\s/g,'');
  c.estado='llamando';save();upStats();renderList();sel(curId);
  document.getElementById('cban').classList.add('on');
  sec=0;clearInterval(iv);
  iv=setInterval(()=>{sec++;const m=Math.floor(sec/60),s=sec%60;document.getElementById('ctm').textContent=m+':'+(s<10?'0':'')+s;},1000);
  try{
    const resultado=await callViaProxy(phone,c);
    toast('✓ Llamada lanzada al '+phone,'ok');
    const callId=resultado?.id||c._callId;
    if(callId){fetchCallNotes(callId,curId);pollCallStatus(callId,curId);}
  }catch(e){toast('Error: '+e.message,'err');stopCall();}
}

async function callViaProxy(phone,c){
  const phoneNumId='0d4fe76e-760c-4cf8-8760-b291bb96aac5';
  const voiceId='uQw4jpKzMLrZuo0RLPS9';
  const elKey='sk_57942fe62398a4deae03f454de30e8229192223181dbaa59';
  const payload={
    phoneNumberId:phoneNumId,
    customer:{number:phone,name:c.nombre},
    assistant:{
      name:'Agente Factor Energia',
      firstMessageMode:'assistant-speaks-first-with-model-generated-message',
      startSpeakingPlan:{waitSeconds:2},
      firstMessage:c.nif==='AMIGO'?'Hola Francisco, portate bien que te estoy vigilando. Tengo un dron japones encima tuyo.':'Hola, buenos días. Te llamo porque estamos revisando varios suministros de la zona y hemos visto que en muchos casos hay desajustes en las potencias contratadas que están generando sobrecostes. ¿Eres tú quien lleva este tema?',
      model:{provider:'openai',model:'gpt-4o',temperature:0.4,maxTokens:150,messages:[{role:'system',content:'CRITICO: Habla SIEMPRE en castellano espanol.\n\n'+buildPlain(c)}]},
      voice:{provider:'11labs',voiceId:voiceId,model:'eleven_turbo_v2_5',stability:0.55,similarityBoost:0.8},
      transcriber:{provider:'deepgram',model:'nova-2',language:'es'},
      endCallMessage:'Muchas gracias por su tiempo. Hasta pronto.',
      recordingEnabled:true,
      endCallPhrases:['adiós','adios','hasta luego','hasta pronto','vale gracias','muchas gracias adiós','hasta el jueves','hasta mañana','que tenga un buen día','hasta entonces']
    }
  };
  const r=await fetch('https://api.vapi.ai/call',{
    method:'POST',
    headers:{Authorization:'Bearer '+VAPI_KEY,'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  });
  if(!r.ok){const t=await r.text();throw new Error('Vapi '+r.status+': '+t.slice(0,160));}
  const data=await r.json();
  if(data?.id){const cx=C.find(x=>x.id===curId);if(cx)cx._callId=data.id;}
  return data;
}

async function stopCall(){
  clearInterval(iv);
  document.getElementById('cban').classList.remove('on');
  const c=C.find(x=>x.id===curId);
  if(c?._callId){
    try{await fetch('https://api.vapi.ai/call/'+c._callId,{method:'PATCH',headers:{Authorization:'Bearer '+VAPI_KEY,'Content-Type':'application/json'},body:JSON.stringify({status:'ended'})});}catch(e){}
  }
  if(c&&c.estado==='llamando'){c.estado='pendiente';save();upStats();renderList();sel(curId);}
}

async function pollCallStatus(callId,contactId){
  for(let i=0;i<30;i++){
    await new Promise(r=>setTimeout(r,5000));
    try{
      const r=await fetch('https://api.vapi.ai/call/'+callId,{headers:{Authorization:'Bearer '+VAPI_KEY}});
      if(!r.ok) continue;
      const data=await r.json();
      if(data.status==='ended'||data.status==='failed'){
        const c=C.find(x=>x.id===contactId);
        if(c&&c.estado==='llamando'){
          clearInterval(iv);
          document.getElementById('cban').classList.remove('on');
          if(data.endedReason==='customer-did-not-answer'||data.endedReason==='no-answer'){c.estado='noContesta';toast('Sin respuesta','');}
          else if(data.endedReason?.includes('voicemail')){c.estado='noContesta';toast('Buzón de voz','');}
          else{c.estado='pendiente';}
          save();upStats();renderList();
          if(curId===contactId) sel(contactId);
        }
        return;
      }
    }catch(e){}
  }
  const c=C.find(x=>x.id===curId);
  if(c&&c.estado==='llamando'){c.estado='pendiente';clearInterval(iv);document.getElementById('cban').classList.remove('on');save();upStats();renderList();if(curId)sel(curId);}
}

async function fetchCallNotes(callId,contactId){
  if(!callId) return;
  toast('Analizando llamada...','');
  try{
    const r=await fetch(BACKEND_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({callId})});
    if(!r.ok) return;
    const data=await r.json();
    const c=C.find(x=>x.id===contactId);if(!c) return;
    if(data.notas) c.notas=(c.notas&&c.notas.length>5?c.notas+'\n\n':'')+data.notas;
    if(data.resultado&&data.resultado!=='pendiente') c.estado=data.resultado;
    if(data.nombreContacto&&!c.contactName) c.contactName=data.nombreContacto;
    if(data.fechaVisita&&!c.visitDate) c.visitDate=data.fechaVisita;
    if(data.emailContacto&&!c.email) c.email=data.emailContacto;
    save();upStats();renderList();
    if(curId===contactId) sel(contactId);
    toast('✓ Notas guardadas','ok');
  }catch(e){console.error('fetchCallNotes:',e);}
}

function copyScript(){
  const c=C.find(x=>x.id===curId);if(!c) return;
  navigator.clipboard.writeText(buildPlain(c)).then(()=>toast('Guión copiado','ok'));
}

function toast(m,t){
  const e=document.getElementById('toast');
  e.textContent=m;e.className='toast '+(t||'')+' show';
  setTimeout(()=>e.classList.remove('show'),3000);
}

init();
</script>
